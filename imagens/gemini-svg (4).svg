<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 90" width="100%" height="100%">
  <!-- Definições de Gradientes e Efeitos -->
  <defs>
    <linearGradient id="operoz-dark-solo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c87f2" />
      <stop offset="100%" stop-color="#5e6ad2" />
    </linearGradient>
  </defs>

  <g transform="translate(1, 5)">
    <!-- ÍCONE: O Hexágono em Tom Escuro (Grafite Metálico) -->
    <path d="M 35 10 
             L 65 27 
             L 65 62 
             L 35 79 
             L 5 62 
             L 5 27 
             Z" 
          fill="none" 
          stroke="#333545" 
          stroke-width="7" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
    
    <!-- Detalhe Interno / Pipeline Ativo com Brilho -->
    <path d="M 35 32 
             L 50 41 
             L 50 58" 
          fill="none" 
          stroke="url(#operoz-dark-solo)" 
          stroke-width="6" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
          
    <!-- Ponto de Conexão do Fluxo -->
    <circle cx="35" cy="32" r="4" fill="#ffffff" />
  </g>
</svg>
