services:
  operis-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: unless-stopped
    networks:
      - dev_env
    volumes:
      - redisdata:/data
    ports:
      # Use 16379 on host if another process already binds 6379 (containers still use 6379 internally).
      - "16379:6379"

  operis-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    networks:
      - dev_env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}

  operis-minio:
    image: minio/minio
    restart: unless-stopped
    networks:
      - dev_env
    entrypoint: >
      /bin/sh -c "
      mkdir -p /export/${AWS_S3_BUCKET_NAME} &&
      minio server /export --console-address ':9090' &
      sleep 5 &&
      mc alias set myminio http://localhost:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} &&
      mc mb myminio/${AWS_S3_BUCKET_NAME} -p || true
      && tail -f /dev/null
      "
    volumes:
      - uploads:/export
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000"
      - "9090:9090"

  operis-db:
    # Imagem com pgvector para RAG do assistente (extensão vector).
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    networks:
      - dev_env
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    # Evita "[Errno -2] Name does not resolve" ao contactar SMTP (ex.: Resend) no Docker Desktop Windows.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
      - ./docs:/docs:ro
      - ./templates:/code/templates:ro
    command: ./bin/docker-entrypoint-api-local.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - operis-db
      - operis-redis
      - operis-mq
      - operis-minio
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000
      USE_PGBOUNCER: ${USE_PGBOUNCER:-0}
    ports:
      - "8000:8000"
    mem_limit: 1536m

  api-chat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-api-chat-local.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      DJANGO_SETTINGS_MODULE: operis.settings.local
      PORT: "8001"
      GUNICORN_CHAT_WORKERS: ${GUNICORN_CHAT_WORKERS:-4}
      USE_PGBOUNCER: ${USE_PGBOUNCER:-0}
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
    ports:
      - "8001:8001"
    mem_limit: 2g

  operis-pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    restart: unless-stopped
    networks:
      - dev_env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-operis}:${POSTGRES_PASSWORD:-operis}@operis-db:5432/${POSTGRES_DB:-operis}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    depends_on:
      - operis-db
    ports:
      - "6432:5432"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

  beat-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - operis-db
      - operis-redis
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

  automation-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-automation-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

  automation-email-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-automation-email-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

  assistant-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-assistant-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

  assistant-chat-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-assistant-chat-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - api-chat
      - operis-db
      - operis-redis
      - operis-mq
    environment:
      SKIP_ENV_VAR: "1"
      ASSISTANT_CHAT_CELERY_QUEUE: ${ASSISTANT_CHAT_CELERY_QUEUE:-assistant-chat}
      ASSISTANT_CHAT_WORKER_CONCURRENCY: ${ASSISTANT_CHAT_WORKER_CONCURRENCY:-8}
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"

  migrator:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
      args:
        DOCKER_BUILDKIT: 1
    restart: "no"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dev_env
    volumes:
      - ./apps/api:/code
    command: ./bin/docker-entrypoint-migrator.sh --settings=operis.settings.local
    env_file:
      - ./apps/api/.env
    depends_on:
      - operis-db
      - operis-redis
      - operis-minio
    environment:
      SKIP_ENV_VAR: "1"
      AWS_S3_ENDPOINT_URL: http://operis-minio:9000
      USE_MINIO: "1"
      MINIO_PUBLIC_ENDPOINT_URL: http://localhost:9000

volumes:
  redisdata:
  uploads:
  pgdata:
  rabbitmq_data:

networks:
  dev_env:
    driver: bridge
