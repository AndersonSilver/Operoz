<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ headline }}</title>
    <style type="text/css">
      body { font-family: system-ui, sans-serif; background: #f7f9ff; color: #1f2d5c; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 0 auto; background: #fcfcfd; border: 1px solid #e4e7ef; border-radius: 6px; padding: 24px; }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.6; margin: 0 0 12px; }
      .meta { color: #5c6580; font-size: 13px; }
      .cta { display: inline-block; margin-top: 16px; padding: 10px 16px; background: #3358d4; color: #fff !important; text-decoration: none; border-radius: 4px; font-size: 14px; }
      ul { padding-left: 18px; margin: 8px 0 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{ headline }}</h1>
      <p class="meta">{{ workspace_slug }} / {{ project_name }} / {{ issue_identifier }}</p>
      <p><strong>{{ issue_name }}</strong></p>
      {% if detail_lines %}
      <ul>
        {% for line in detail_lines %}
        <li>{{ line }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      <a class="cta" href="{{ issue_url }}">Abrir no Operoz</a>
    </div>
  </body>
</html>
