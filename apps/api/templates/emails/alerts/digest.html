<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8" />
    <title>Resumo de alertas</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f7f9ff; color: #1f2d5c; padding: 24px; }
      .card { max-width: 560px; margin: 0 auto; background: #fcfcfd; border: 1px solid #e4e7ef; border-radius: 6px; padding: 24px; }
      h1 { font-size: 18px; margin-bottom: 16px; }
      .item { border-top: 1px solid #e4e7ef; padding: 12px 0; }
      .item a { color: #3358d4; text-decoration: none; font-weight: 600; }
      .meta { font-size: 12px; color: #5c6580; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Resumo diário de alertas</h1>
      <p>Olá {{ user_name }}, você tem {{ items|length }} alerta(s) em {{ workspace_slug }}.</p>
      {% for item in items %}
      <div class="item">
        <div class="meta">{{ item.headline }}</div>
        <a href="{{ item.issue_url }}">{{ item.issue_identifier }} — {{ item.issue_name }}</a>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
