# Deploy de PRODUÇÃO — disparado por tag de release (v*), não por push de branch.
#
# Fluxo recomendado:
#   1. Merge / push na branch main → valida e publica em hml.operoz.io
#   2. Quando aprovado: git tag v1.2.3 && git push origin v1.2.3 → produção (operoz.io)
#
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
# Variables: OPEROZ_WEB_URL, OPEROZ_REPO_PATH, OPEROZ_APP_PATH, OPEROZ_SELF_HOSTED_RUNNER

name: Deploy Operoz (Produção)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de release no GHCR (ex. v1.2.3)"
        required: true
        type: string
      deploy_target:
        description: "O que publicar"
        required: true
        default: full
        type: choice
        options:
          - web
          - mcp
          - full
      skip_build:
        description: "Só redeploy (pula build; usa tag já no GHCR)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-operoz-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SSH_TIMEOUT: 180s
  SSH_COMMAND_TIMEOUT: 45m

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.lower.outputs.image_repo }}
      use_self_hosted: ${{ steps.mode.outputs.use_self_hosted }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      build_stack: ${{ steps.mode.outputs.build_stack }}
    steps:
      - name: Resolver tag de release
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "${tag}" =~ ^v ]]; then
            echo "::error::Tag de produção deve começar com v (ex. v1.2.3); recebido: ${tag}"
            exit 1
          fi
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: GHCR exige nome do repositório em minúsculas
        id: lower
        run: echo "image_repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Modo de deploy
        id: mode
        run: |
          if [[ "${{ vars.OPEROZ_SELF_HOSTED_RUNNER || vars.OPERIS_SELF_HOSTED_RUNNER }}" == "true" ]]; then
            echo "use_self_hosted=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_self_hosted=false" >> "$GITHUB_OUTPUT"
          fi

          build_stack=false
          if [[ "${{ github.event_name }}" == "push" ]]; then
            build_stack=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_target }}" == "full" ]]; then
            build_stack=true
          fi
          echo "build_stack=${build_stack}" >> "$GITHUB_OUTPUT"

  build-web:
    needs: meta
    if: ${{ !inputs.skip_build && (github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'mcp' || inputs.deploy_target == 'full') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
      WEB_IMAGE_NAME: ghcr.io/${{ needs.meta.outputs.image_repo }}/plane-frontend
      MCP_IMAGE_NAME: ghcr.io/${{ needs.meta.outputs.image_repo }}/operoz-mcp
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ needs.meta.outputs.release_tag }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push plane-frontend
        if: ${{ github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'full' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/web/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.WEB_IMAGE_NAME }}:stable
            ${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_ENABLE_BOARDS=true
            VITE_API_BASE_URL=${{ vars.OPEROZ_WEB_URL || vars.OPERIS_WEB_URL || 'https://www.operoz.io' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push operoz-mcp
        if: ${{ github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'mcp' || inputs.deploy_target == 'full' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: mcp-server
          file: mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.MCP_IMAGE_NAME }}:stable
            ${{ env.MCP_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-full:
    needs: meta
    if: ${{ !inputs.skip_build && needs.meta.outputs.build_stack == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
      IMAGE_PREFIX: ghcr.io/${{ needs.meta.outputs.image_repo }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: plane-backend
            context: apps/api
            file: apps/api/Dockerfile.api
          - service: plane-space
            context: .
            file: apps/space/Dockerfile.space
          - service: plane-admin
            context: .
            file: apps/admin/Dockerfile.admin
          - service: plane-live
            context: .
            file: apps/live/Dockerfile.live
          - service: plane-proxy
            context: apps/proxy
            file: apps/proxy/Dockerfile.ce
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ needs.meta.outputs.release_tag }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:stable
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [meta, build-web, build-full]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ${{ needs.meta.outputs.use_self_hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
      WEB_IMAGE_NAME: ghcr.io/${{ needs.meta.outputs.image_repo }}/plane-frontend
      MCP_IMAGE_NAME: ghcr.io/${{ needs.meta.outputs.image_repo }}/operoz-mcp
      IMAGE_PREFIX: ghcr.io/${{ needs.meta.outputs.image_repo }}
      IMAGE_TAG: ${{ needs.meta.outputs.release_tag }}
      LOCAL_RELEASE_TAG: stable
      GIT_REF: ${{ needs.meta.outputs.release_tag }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPEROZ_REPO_PATH: ${{ vars.OPEROZ_REPO_PATH || '/root/operis-selfhost/Operis' }}
      OPEROZ_APP_PATH: ${{ vars.OPEROZ_APP_PATH || '/root/operis-selfhost/plane-app' }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Preflight SSH (modo remoto)
        if: ${{ needs.meta.outputs.use_self_hosted != 'true' }}
        run: |
          set +e
          nc -zv -w 15 "${{ secrets.VPS_HOST }}" 22
          if [[ $? -ne 0 ]]; then
            echo "::error::Porta 22 inacessível. Configure OPEROZ_SELF_HOSTED_RUNNER=true ou abra SSH."
            exit 1
          fi

      - name: Deploy web (runner local)
        if: ${{ needs.meta.outputs.build_stack != 'true' && needs.meta.outputs.use_self_hosted == 'true' && (github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'full') }}
        env:
          WEB_IMAGE: ${{ env.WEB_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          OPEROZ_WEB_URL: ${{ vars.OPEROZ_WEB_URL || vars.OPERIS_WEB_URL || 'https://www.operoz.io' }}
        run: bash .github/scripts/vps-deploy-web.sh

      - name: Deploy web via SSH
        if: ${{ needs.meta.outputs.build_stack != 'true' && needs.meta.outputs.use_self_hosted != 'true' && (github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'full') }}
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEB_IMAGE: ${{ env.WEB_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LOCAL_RELEASE_TAG: stable
          GIT_REF: ${{ env.GIT_REF }}
          OPEROZ_WEB_URL: ${{ vars.OPEROZ_WEB_URL || vars.OPERIS_WEB_URL || 'https://www.operoz.io' }}
          OPEROZ_REPO_PATH: ${{ env.OPEROZ_REPO_PATH }}
          OPEROZ_APP_PATH: ${{ env.OPEROZ_APP_PATH }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          envs: GHCR_TOKEN,WEB_IMAGE,IMAGE_TAG,LOCAL_RELEASE_TAG,GIT_REF,OPEROZ_WEB_URL,OPEROZ_REPO_PATH,OPEROZ_APP_PATH,GITHUB_ACTOR
          script_path: .github/scripts/vps-deploy-web.sh

      - name: Deploy MCP (runner local)
        if: ${{ needs.meta.outputs.use_self_hosted == 'true' && (github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'mcp' || inputs.deploy_target == 'full') }}
        env:
          MCP_IMAGE: ${{ env.MCP_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
        run: bash .github/scripts/vps-deploy-mcp.sh

      - name: Deploy MCP via SSH
        if: ${{ needs.meta.outputs.use_self_hosted != 'true' && (github.event_name == 'push' || inputs.deploy_target == 'web' || inputs.deploy_target == 'mcp' || inputs.deploy_target == 'full') }}
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MCP_IMAGE: ${{ env.MCP_IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LOCAL_RELEASE_TAG: stable
          GIT_REF: ${{ env.GIT_REF }}
          OPEROZ_REPO_PATH: ${{ env.OPEROZ_REPO_PATH }}
          OPEROZ_MCP_ENV: ${{ vars.OPEROZ_MCP_ENV || '' }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          envs: GHCR_TOKEN,MCP_IMAGE,IMAGE_TAG,LOCAL_RELEASE_TAG,GIT_REF,OPEROZ_REPO_PATH,OPEROZ_MCP_ENV,GITHUB_ACTOR
          script_path: .github/scripts/vps-deploy-mcp.sh

      - name: Deploy full stack (runner local)
        if: ${{ needs.meta.outputs.build_stack == 'true' && needs.meta.outputs.use_self_hosted == 'true' }}
        env:
          OPEROZ_WEB_URL: ${{ vars.OPEROZ_WEB_URL || vars.OPERIS_WEB_URL || 'https://www.operoz.io' }}
        run: bash .github/scripts/vps-deploy-full.sh

      - name: Deploy full stack via SSH
        if: ${{ needs.meta.outputs.build_stack == 'true' && needs.meta.outputs.use_self_hosted != 'true' }}
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LOCAL_RELEASE_TAG: stable
          GIT_REF: ${{ env.GIT_REF }}
          OPEROZ_WEB_URL: ${{ vars.OPEROZ_WEB_URL || vars.OPERIS_WEB_URL || 'https://www.operoz.io' }}
          OPEROZ_REPO_PATH: ${{ env.OPEROZ_REPO_PATH }}
          OPEROZ_APP_PATH: ${{ env.OPEROZ_APP_PATH }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: ${{ env.SSH_TIMEOUT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          envs: GHCR_TOKEN,IMAGE_PREFIX,IMAGE_TAG,LOCAL_RELEASE_TAG,GIT_REF,OPEROZ_WEB_URL,OPEROZ_REPO_PATH,OPEROZ_APP_PATH,GITHUB_ACTOR
          script_path: .github/scripts/vps-deploy-full.sh

  e2e-smoke:
    needs: [meta, deploy]
    if: ${{ success() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_WEB_URL: ${{ vars.OPEROZ_WEB_URL || 'https://operoz.io' }}
      E2E_API_URL: ${{ vars.OPEROZ_WEB_URL || 'https://operoz.io' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/tags/${{ needs.meta.outputs.release_tag }}
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter=e2e

      - name: Install Playwright browsers
        run: pnpm --filter=e2e exec playwright install --with-deps chromium

      - name: E2E smoke (f0)
        run: pnpm --filter=e2e exec playwright test src/f0-smoke.spec.ts --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-${{ github.sha }}
          path: apps/e2e/playwright-report/
          retention-days: 7
