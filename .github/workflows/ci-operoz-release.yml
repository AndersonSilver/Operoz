# Gates de release Operoz — build web + testes API críticos antes do deploy.
# Complementa ci-assistant.yml (escopo estreito) e deploy-operoz.yml (build/deploy).

name: CI Operoz Release

on:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

concurrency:
  group: ci-operoz-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (SPA)
        run: CI=true pnpm turbo run build --filter=web --force
        env:
          VITE_ENABLE_BOARDS: "true"
          VITE_API_BASE_URL: https://operoz.io

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: operoz
          POSTGRES_PASSWORD: operoz
          POSTGRES_DB: operoz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U operoz -d operoz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:7.2.11-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgres://operoz:operoz@localhost:5432/operoz
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-operoz-release
      LLM_API_KEY: sk-ci-mock
      ASSISTANT_ENABLED: "1"
      WEB_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements/test.txt

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Django check
        run: python manage.py check

      - name: Pytest (PRD Review + Assistant smoke)
        run: |
          python -m pytest \
            operoz/tests/contract/app/test_prd_review.py \
            operoz/tests/unit/assistant/test_prd_review_summary_tool.py \
            operoz/tests/unit/assistant/ \
            operoz/tests/contract/app/test_assistant_app.py \
            -q --tb=short

  mcp-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run build
