# Gates de release Operoz — build web + testes API críticos antes do deploy.
# Complementa ci-assistant.yml (escopo estreito) e deploy-operis.yml (build/deploy).

name: CI Operoz Release

on:
  push:
    branches: [preview]
  pull_request:
    branches: [preview]

concurrency:
  group: ci-operoz-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (SPA)
        run: CI=true pnpm turbo run build --filter=web --force
        env:
          VITE_ENABLE_BOARDS: "true"
          VITE_API_BASE_URL: https://operis.webcycle.com.br

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: operis
          POSTGRES_PASSWORD: operis
          POSTGRES_DB: operis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U operis -d operis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:7.2.11-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgres://operis:operis@localhost:5432/operis
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-operoz-release
      LLM_API_KEY: sk-ci-mock
      ASSISTANT_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements/test.txt

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Django check
        run: python manage.py check

      - name: Pytest (PRD Review + Assistant smoke)
        run: |
          python -m pytest \
            operis/tests/contract/app/test_prd_review.py \
            operis/tests/unit/assistant/test_prd_review_summary_tool.py \
            operis/tests/unit/assistant/ \
            operis/tests/contract/app/test_assistant_app.py \
            -q --tb=short

  mcp-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run build
