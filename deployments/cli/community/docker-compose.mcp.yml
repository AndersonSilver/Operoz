# Overlay opcional: MCP no mesmo projeto compose que api/web.
# Uso em plane-app:
#   docker compose -f docker-compose.yaml -f .../docker-compose.mcp.yml --env-file operoz.env --env-file operoz-mcp.env up -d mcp
#
# Requer ficheiro operoz-mcp.env (ver deployments/mcp/operoz-mcp.env.example)

services:
  mcp:
    image: ${MCP_IMAGE:-myoperoz/operoz-mcp:stable}
    container_name: operoz-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PUBLISH:-127.0.0.1:3100}:3100"
    environment:
      OPEROZ_API_BASE_URL: ${MCP_OPEROZ_API_BASE_URL:-http://api:8000}
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3100"
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
