# Operoz MCP — serviço HTTP separado do stack plane-app.
# Uso: docker compose --env-file operoz-mcp.env up -d
#
# Reverse proxy (Nginx Proxy Manager): mcp.seudominio.com → http://<IP-VPS>:3100/mcp

services:
  operoz-mcp:
    image: ${MCP_IMAGE:-myoperoz/operoz-mcp:stable}
    container_name: operoz-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PUBLISH:-127.0.0.1:3100}:3100"
    environment:
      OPEROZ_API_BASE_URL: ${OPEROZ_API_BASE_URL:?defina OPEROZ_API_BASE_URL no operoz-mcp.env}
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3100"
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-mcp.operoz.webcycle.com.br,127.0.0.1,localhost}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
