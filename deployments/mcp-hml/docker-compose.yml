# Operoz MCP — instância de HOMOLOGAÇÃO, aponta para a API do HML.
# Existe para testar mudanças no MCP server contra dados/API de HML antes de
# ir para produção (deployments/mcp/docker-compose.yml). Serviço avulso,
# fora da stack plane-app-hml.
#
# Uso: docker compose --env-file operoz-mcp-hml.env up -d
#
# Reverse proxy (Nginx Proxy Manager): mcp-hml.operoz.io → http://127.0.0.1:3101

services:
  operoz-mcp-hml:
    image: ${MCP_IMAGE:-myoperoz/operoz-mcp:hml}
    container_name: operoz-mcp-hml
    restart: unless-stopped
    ports:
      - "${MCP_PUBLISH:-127.0.0.1:3101}:3100"
    environment:
      OPEROZ_API_BASE_URL: ${OPEROZ_API_BASE_URL:?defina OPEROZ_API_BASE_URL no operoz-mcp-hml.env}
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3100"
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-mcp-hml.operoz.io,127.0.0.1,localhost}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
